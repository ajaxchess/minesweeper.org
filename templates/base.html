<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Minesweeper{% endblock %} | Minesweeper.org</title>
  <meta name="description" content="{% block description %}Play free Minesweeper online. Beginner, Intermediate, Expert and Custom modes.{% endblock %}">
  <link rel="stylesheet" href="/static/css/style.css" />

  <!-- Google AdSense — replace ca-pub-XXXXXXXXXXXXXXXX with your publisher ID -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX"
     crossorigin="anonymous"></script>
</head>
<body>

  <header>
    <div class="header-inner">
      <a href="/" class="logo">💣 Minesweeper.org</a>
      <nav>
        <a href="/" class="{% if mode == 'beginner' %}active{% endif %}">Beginner</a>
        <a href="/intermediate" class="{% if mode == 'intermediate' %}active{% endif %}">Intermediate</a>
        <a href="/expert" class="{% if mode == 'expert' %}active{% endif %}">Expert</a>
        <a href="/custom" class="{% if mode == 'custom' %}active{% endif %}">Custom</a>
        <a href="/leaderboard" class="{% if mode == 'leaderboard' %}active{% endif %}">🏆 Leaderboard</a>
        <a href="/help" class="{% if mode == 'help' %}active{% endif %}">❓ Help</a>
      </nav>
    </div>
  </header>

  <!-- Top Banner Ad -->
  <div class="ad-container ad-top">
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
         data-ad-slot="1234567890"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  </div>

  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- Bottom Banner Ad -->
  <div class="ad-container ad-bottom">
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
         data-ad-slot="0987654321"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  </div>

  <footer>
    <p>© 2025 Minesweeper.org &mdash; Built with Python &amp; FastAPI</p>
  </footer>

  <script src="/static/js/minesweeper.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
