# /etc/apache2/sites-available/staging.minesweeper.org-le-ssl.conf
#
# When uvicorn is stopped, ProxyErrorOverride On lets Apache intercept the 503
# connection-refused error.  ErrorDocument 503 with a full URL issues a 302
# redirect to production so visitors land on minesweeper.org instead of a raw
# Apache error page.
#
# The only additions to the original config are the two lines marked NEW below.
#
# To apply on the server:
#   sudo cp scripts/staging-minesweeper.conf \
#       /etc/apache2/sites-available/staging.minesweeper.org-le-ssl.conf
#   sudo systemctl reload apache2

<VirtualHost *:443>
  Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
  ServerAdmin minesweeper@gmail.com
  ServerName staging.minesweeper.org

  ProxyPreserveHost On

  RequestHeader set X-Forwarded-Proto "https"
  RequestHeader set X-Forwarded-Host  "%{HTTP_HOST}s"

  # NEW: when uvicorn is down, redirect to production instead of showing an error
  ProxyErrorOverride On
  ErrorDocument 503 https://minesweeper.org

  # Proxy WebSocket traffic
  ProxyPass /ws/ ws://127.0.0.1:8002/ws/ upgrade=websocket retry=0
  ProxyPassReverse /ws/ ws://127.0.0.1:8002/ws/

  # Proxy normal HTTP traffic
  ProxyPass / http://127.0.0.1:8002/ retry=0
  ProxyPassReverse / http://127.0.0.1:8002/

  <Directory />
    Options FollowSymLinks
    AllowOverride All
  </Directory>
  <Directory /var/www/>
    Options Indexes FollowSymLinks MultiViews
    AllowOverride All
    Order allow,deny
    allow from all
  </Directory>

  Include /etc/letsencrypt/options-ssl-apache.conf
  ServerAlias staging.minesweeper.org
  SSLCertificateFile /etc/letsencrypt/live/staging.minesweeper.org/fullchain.pem
  SSLCertificateKeyFile /etc/letsencrypt/live/staging.minesweeper.org/privkey.pem

  ErrorLog  ${APACHE_LOG_DIR}/staging.minesweeper.org-ssl-error.log
  CustomLog ${APACHE_LOG_DIR}/staging.minesweeper.org-ssl-access.log combined
</VirtualHost>
